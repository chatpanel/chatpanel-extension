# Build the extension, attach it to a GitHub Release, and (separately) publish to
# the Chrome Web Store. These are DECOUPLED so you can test before publishing:
#
#   • Push a tag `ext-v*`  → builds the zip + creates the GitHub Release ONLY.
#                            Nothing goes to the Web Store. Download the zip from
#                            the release (or dl.chatpanel.net) and test it.
#   • Run this workflow manually (workflow_dispatch) with publish=true → uploads
#                            the build to the Chrome Web Store for review.
#
# So the flow is: tag → test the GitHub build → manually dispatch to publish.
# The version that ships is whatever is in extension/manifest.json.
#
# The release attaches BOTH a versioned zip (chatpanel-extension-v<x>.zip) and a
# stable-named zip (chatpanel-extension.zip). The stable name powers a permanent
# download URL that never changes between versions:
#
#   https://github.com/chatpanel/chatpanel-extension/releases/latest/download/chatpanel-extension.zip
name: Release extension

on:
  push:
    tags: ['ext-v*']
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to the Web Store (false = build only)'
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      CWS_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Package extension
        run: node tools/package-extension.mjs

      # Always upload the built zips as a run artifact, so a `workflow_dispatch`
      # (publish=false) build can be downloaded and sanity-checked WITHOUT a tag
      # or a Web Store submission. Tagged runs also get this, in addition to the
      # attached GitHub Release below.
      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: chatpanel-extension-zip
          path: dist/chatpanel-extension*.zip
          if-no-files-found: error

      - name: Publish to Chrome Web Store
        # Decoupled from tagging: ONLY a manual workflow_dispatch with publish=true
        # submits to the store. A tag push builds + releases but never publishes.
        if: ${{ env.CWS_TOKEN != '' && github.event_name == 'workflow_dispatch' && inputs.publish }}
        env:
          CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
          EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
        run: |
          set -euo pipefail
          echo "Requesting access token…"
          TOKEN=$(curl -sf -X POST https://oauth2.googleapis.com/token \
            -d "client_id=$CLIENT_ID" \
            -d "client_secret=$CLIENT_SECRET" \
            -d "refresh_token=$REFRESH_TOKEN" \
            -d "grant_type=refresh_token" | jq -r .access_token)
          [ -n "$TOKEN" ] && [ "$TOKEN" != "null" ] || { echo "Could not get access token"; exit 1; }

          echo "Uploading package…"
          UPLOAD=$(curl -sf -X PUT -T dist/chatpanel-extension.zip \
            -H "Authorization: Bearer $TOKEN" \
            -H "x-goog-api-version: 2" \
            "https://www.googleapis.com/upload/chromewebstore/v1.1/items/$EXTENSION_ID")
          echo "$UPLOAD"
          echo "$UPLOAD" | jq -e '.uploadState == "SUCCESS"' >/dev/null \
            || { echo "Upload failed"; exit 1; }

          echo "Publishing…"
          curl -sf -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "x-goog-api-version: 2" \
            -H "Content-Length: 0" \
            "https://www.googleapis.com/chromewebstore/v1.1/items/$EXTENSION_ID/publish"
          echo "Submitted for review."

      - name: Skip notice
        if: ${{ env.CWS_TOKEN == '' }}
        run: echo "::notice::Built the zip but skipped Web Store publish — set CHROME_EXTENSION_ID, CHROME_CLIENT_ID, CHROME_CLIENT_SECRET, CHROME_REFRESH_TOKEN to enable."

      - name: Attach zips to the GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          # Both the versioned zip AND the stable name (for the permanent
          # /releases/latest/download/chatpanel-extension.zip link).
          files: |
            dist/chatpanel-extension.zip
            dist/chatpanel-extension-*.zip
