<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ChatPanel — Chat history</title>
    <link rel="icon" href="assets/icon128.png" />
    <link rel="stylesheet" href="icons.css" />
    <link rel="stylesheet" href="meetings.css" />
  </head>
  <body>
    <header class="hdr">
      <nav class="topnav" aria-label="Workspace">
        <a href="notes.html" class="topnav-item" data-icon="notes">Notes</a>
        <a href="history.html" class="topnav-item active" data-icon="menu">Chats <span id="h-count" class="count"></span></a>
        <a href="meetings.html" class="topnav-item" data-icon="meetings">Meetings</a>
      </nav>
      <div class="hdr-actions">
        <button id="omni-open" class="omni-trigger" type="button" title="Search notes, chats & meetings (⌘K)"><span data-icon="search"></span><span class="omni-trigger-label">Search everything</span><kbd>⌘K</kbd></button>
        <button id="h-graph-toggle" class="btn" type="button" data-icon="graph">Graph</button>
        <button id="h-open-panel" class="btn" type="button" title="Open the ChatPanel side panel" data-icon="chat">Open ChatPanel</button>
        <button id="h-settings" class="btn ghost" type="button" data-icon="settings">ChatPanel settings</button>
      </div>
    </header>
    <div class="layout">
      <aside class="mlist">
        <input id="h-search" class="search" type="search" placeholder="Search all chats — messages, titles…" />
        <div class="seg" id="h-modes">
          <button data-mode="smart" class="active" type="button" title="BM25 full-text relevance">Best match</button>
          <button data-mode="keyword" type="button" title="Exact substring match">Exact text</button>
        </div>
        <div id="h-items"></div>
      </aside>
      <main class="detail">
        <div class="empty" id="h-empty">Select a chat to view it.</div>
        <div id="h-content" class="hidden"></div>
        <!-- Corpus dashboard — a tabbed overview of all chats (Stats / Topic graph /
             Related), shown via the header "Graph" button. Mirrors Notes & Meetings. -->
        <div id="h-dash" class="dash hidden">
          <div class="dash-tabs seg" role="tablist" aria-label="Dashboard view">
            <button data-dash="stats" class="active" type="button" role="tab" data-icon="chart">Stats</button>
            <button data-dash="graph" type="button" role="tab" data-icon="graph">Topic graph</button>
            <button data-dash="related" type="button" role="tab" data-icon="waypoints">Related</button>
          </div>
          <div class="dash-body">
            <div id="h-dash-stats" class="dash-pane" role="tabpanel"></div>
            <div id="h-dash-graph" class="dash-pane hidden" role="tabpanel"></div>
            <div id="h-dash-related" class="dash-pane hidden" role="tabpanel"></div>
          </div>
        </div>
      </main>
    </div>
    <div id="h-toast" class="toast hidden"></div>
    <script type="module" src="history.js"></script>
  </body>
</html>
