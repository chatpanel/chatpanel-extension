<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ChatPanel — Meetings</title>
    <link rel="icon" href="assets/icon128.png" />
    <link rel="stylesheet" href="icons.css" />
    <link rel="stylesheet" href="meetings.css" />
  </head>
  <body>
    <header class="hdr">
      <nav class="topnav" aria-label="Workspace">
        <a href="notes.html" class="topnav-item" data-icon="notes">Notes</a>
        <a href="history.html" class="topnav-item" data-icon="menu">Chats</a>
        <a href="meetings.html" class="topnav-item active" data-icon="meetings">Meetings <span id="m-count" class="count"></span></a>
      </nav>
      <div class="hdr-actions">
        <button id="omni-open" class="omni-trigger" type="button" title="Search notes, chats & meetings (⌘K)"><span data-icon="search"></span><span class="omni-trigger-label">Search everything</span><kbd>⌘K</kbd></button>
        <button id="m-import" class="btn" type="button" data-icon="download">Import meeting</button>
        <input id="m-import-file" type="file" accept=".md,.markdown,.txt,text/markdown,text/plain" multiple class="hidden" />
        <button id="m-graph-toggle" class="btn" type="button" data-icon="graph">Graph</button>
        <button id="m-settings" class="btn ghost" type="button" data-icon="settings">ChatPanel settings</button>
      </div>
    </header>
    <div class="layout">
      <aside class="mlist">
        <input id="m-search" class="search" type="search" placeholder="Search meetings, notes, transcripts, attendees…" />
        <div class="seg" id="m-modes">
          <button data-mode="smart" class="active" type="button" title="Ranked search across title, notes, transcript and attendees">Best match</button>
          <button data-mode="keyword" type="button" title="Literal text match across title, notes, transcript and attendees">Exact text</button>
        </div>
        <div id="m-items"></div>
      </aside>
      <main class="detail">
        <div class="empty" id="m-empty">Select a meeting to see its insights.</div>
        <div id="m-content" class="hidden"></div>
        <div id="m-graph" class="hidden"></div>
      </main>
    </div>
    <div id="m-toast" class="toast hidden"></div>
    <script type="module" src="meetings.js"></script>
  </body>
</html>
