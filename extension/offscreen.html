<!doctype html>
<!--
  Offscreen document — the ONLY reason it exists: build the auto-backup file and
  hand back a blob: URL. Service workers have no URL.createObjectURL, so the old
  code base64'd the whole backup into a data: URL, which fails past ~tens of MB
  (and blows SW memory). Here we build the Blob in a real document and download
  the blob: URL instead — no size ceiling. Nothing is rendered; no network.
-->
<meta charset="utf-8" />
<script type="module" src="offscreen.js"></script>
